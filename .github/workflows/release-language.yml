name: Release patcher

on:
  push:
    tags:
      - 'english-patch-v*'
      - 'vietnamese-patch-v*'
      - 'portable-patch-v*'
  workflow_dispatch:
    inputs:
      language:
        description: Patcher release to package
        required: true
        type: choice
        options:
          - english
          - vietnamese
          - portable
      tag:
        description: Existing tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Select release kind
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            kind="${{ inputs.language }}"
            tag="${{ inputs.tag }}"
          elif [[ "${GITHUB_REF_NAME}" == english-patch-v* ]]; then
            kind="english"
            tag="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF_NAME}" == vietnamese-patch-v* ]]; then
            kind="vietnamese"
            tag="${GITHUB_REF_NAME}"
          else
            kind="portable"
            tag="${GITHUB_REF_NAME}"
          fi
          case "$kind" in
            english|vietnamese) test -f "patches/${kind}.dmpatch" ;;
            portable) ;;
            *) echo "Unknown release kind: $kind" >&2; exit 2 ;;
          esac
          echo "kind=${kind}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.77.2
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install Windows GNU linker
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Package Windows patcher
        run: |
          if [[ "${{ steps.release.outputs.kind }}" == "portable" ]]; then
            cargo run -p patch-build -- portable \
              --output-dir release \
              --cnc-ddraw-dir third_party/cnc-ddraw
          else
            cargo run -p patch-build -- package \
              --payload "patches/${{ steps.release.outputs.kind }}.dmpatch" \
              --output-dir release \
              --cnc-ddraw-dir third_party/cnc-ddraw
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.sha256
            release/README.txt
