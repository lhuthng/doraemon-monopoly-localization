name: Release patcher

on:
  push:
    tags:
      - 'patcher-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Check release payloads
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then tag="${{ inputs.tag }}"; else tag="${GITHUB_REF_NAME}"; fi
          test -f patches/english.dmpatch
          test -f patches/vietnamese.dmpatch
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.77.2
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install Windows GNU linker
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Package Windows patcher
        run: |
          cargo run -p patch-build -- universal \
            --english-payload patches/english.dmpatch \
            --vietnamese-payload patches/vietnamese.dmpatch \
            --output-dir release \
            --cnc-ddraw-dir third_party/cnc-ddraw

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.sha256
            release/README.txt
